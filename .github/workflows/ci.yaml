name: Practise_CI
on:
  push:
    branches:
      - main
  
jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses:  actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install 
      - run: node -c indes.js
      - run: docker build -t bauwa .